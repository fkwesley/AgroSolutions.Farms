apiVersion: apps/v1                                                         # Vers„o da API do Kubernetes usada para criar Deployments
kind: Deployment                                                            # Tipo do objeto: Deployment cria rťplicas e faz rollout
metadata:
  name: agro-farms                                                          # Nome do Deployment

spec:
  replicas: 1                                                               # Quantas rťplicas (pods) deseja rodar
  selector:                                                                 # Selector: identifica quais pods pertencem a este Deployment
    matchLabels:
      app: agro-farms

  template:                                                                 # Template: modelo usado para criar cada Pod
    metadata:
      labels:                                                               # Labels aplicadas nos Pods criados
        app: agro-farms

    spec:
      containers:                                                           # Lista de containers dentro do Pod
        - name: agro-farms-container                                        # Nome do container
          image: acragro.azurecr.io/agrosolutions/farms/api:${IMAGE_TAG}    # Imagem do container no ACR
          ports:                                                            # Porta exposta internamente no container
            - containerPort: 8080
          resources:
            limits:
              # =========================
              # CPU
              # =========================
              # 2 nodes Standard A2 v2 com 2 vCPU cada = 4 vCPU totais
              # 4 vCPU (total) - 0,4 vCPU (uso interno do Kubernetes) = 3,6 vCPU
              # 3,6 vCPU / 10 pods = 0,36 vCPU (360 milicores)
              cpu: 360m
              
              # =========================
              # MEMORY
              # =========================
              # 2 nodes Standard A2 v2 com 4 GiB cada = 8 GiB totais
              # 8 GiB (total) - ~1,3 GiB (uso interno do Kubernetes) = 6,7 GiB disponŪveis
              # 6,7 GiB / 10 pods = 670 Mi por pod
              # Limit ajustado para evitar OutOfMemory e permitir burst controlado
              memory: 500Mi
              
            requests:
              cpu: 150m         # Sobra ~1,1 vCPU para kube-system + picos
              memory: 200Mi     # Sobra ~1,7 GiB para kube-system + DaemonSets
          
          # ==========================
          # VariŠveis de ambiente
          # ==========================
          envFrom:
            - configMapRef:
                name: agro-farms-config
            - secretRef:
                name: agro-farms-secret